# Despliega a Azure App Service al hacer push a main.
# Configura en el repo: Settings → Secrets and variables → Actions:
#   AZURE_WEBAPP_PUBLISH_PROFILE (contenido del perfil de publicación de la App Service)

name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: labeldiff-app-gtc6g6g8b2cfhxax
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          # La API key de Gemini no va aquí; se configura en App Service
          GEMINI_API_KEY: ''
          VITE_API_BASE: ''

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp main.py requirements.txt deploy/
          cp -r backend deploy/
          cp -r frontend/dist deploy/frontend/
          cd deploy && zip -r ../deploy.zip . && cd ..

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
