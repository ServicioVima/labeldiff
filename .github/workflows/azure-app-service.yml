# Despliega a Azure App Service al hacer push a main.
# Build del frontend en el pipeline; deploy del repo completo (con frontend/dist ya generado).
# Configura en el repo: Settings → Secrets and variables → Actions:
#   AZURE_WEBAPP_PUBLISH_PROFILE (contenido del perfil de publicación de la App Service)

name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: labeldiff-app
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: frontend
        env:
          GEMINI_API_KEY: ''
          VITE_API_BASE: ''

      - name: Reducir tamaño del deploy (quitar node_modules del frontend)
        run: rm -rf frontend/node_modules

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .